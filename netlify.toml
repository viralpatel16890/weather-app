[build]
  base    = "frontend"
  command = "npm run build"
  publish = "dist/weather-dashboard/browser"

# Proxy /api-proxy/* → Flask backend on Render (keeps backend URL private, no CORS needed)
[[redirects]]
  from   = "/api-proxy/*"
  to     = "https://your-app.onrender.com/api/:splat"
  status = 200
  force  = true

# SPA fallback — all other routes serve index.html so Angular router works
[[redirects]]
  from   = "/*"
  to     = "/index.html"
  status = 200
